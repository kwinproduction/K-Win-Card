    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #050a14; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; width: 100vw; overflow-x: hidden; 
        }

        /* Background Orbs */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: moveOrb 20s infinite alternate ease-in-out; }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: #007bff; bottom: -100px; right: -50px; }
        @keyframes moveOrb { from { transform: translate(0, 0); } to { transform: translate(30px, 50px); } }

        /* Top Bar & Language */
        .top-bar { margin-bottom: 20px; z-index: 10; }
        .lang-switch { display: flex; gap: 10px; background: var(--glass); padding: 5px; border-radius: 50px; }
        .lang-btn { background: none; border: none; color: #8892b0; padding: 8px 15px; cursor: pointer; border-radius: 50px; font-size: 0.8rem; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #0a192f; font-weight: bold; }

        /* Card Stylings */
        .card { width: 92%; max-width: 380px; background: rgba(255, 255, 255, 0.05); padding: 25px 20px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(30px); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); padding: 4px; object-fit: cover; }
        .info-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; margin: 15px 0; border-left: 4px solid var(--primary); text-align: left; font-size: 0.85rem; line-height: 1.8; }
        
        /* Buttons */
        .btn-save, .btn-tt { width: 100%; padding: 14px; border-radius: 18px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 0.9rem; transition: 0.3s; }
        .btn-save { background: #fff; color: #0a192f; }
        .btn-tt { background: linear-gradient(135deg, var(--primary), #3db89e); color: #0a192f; margin-top: 20px; }

        /* Action Grid */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .btn-action { width: 100%; padding: 15px 5px; font-size: 0.85rem; border-radius: 18px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-wa { background: #128C7E; } 
        .btn-call { background: #007bff; }
        .btn-sms { background: #f39c12; color: #000; }
        .btn-email { background: #e74c3c; }

        /* Dropdowns */
        .dropdown { position: relative; width: 100%; }
        .dropdown-content { display: none; position: absolute; background: white; width: 100%; border-radius: 15px; z-index: 99; bottom: 110%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); overflow: hidden; }
        .dropdown-content a { color: #111; padding: 12px; text-decoration: none; display: block; font-size: 0.8rem; border-bottom: 1px solid #eee; }
        .show { display: block !important; }

        /* Timetable Overlay */
        .tt-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .tt-content { background: #111; width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; border: 1px solid var(--primary); }
        .tt-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
        .close-tt { background: var(--primary); color: #000; width: 100%; padding: 12px; border: none; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; }

        /* Socials */
        .social-button-container { width: 92%; max-width: 380px; margin-top: 25px; text-align: center; }
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .grid-btn { display: flex; flex-direction: column; align-items: center; background: var(--glass); padding: 12px 5px; border-radius: 15px; text-decoration: none; color: white; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .grid-btn img { width: 22px; height: 22px; margin-bottom: 8px; }

}

// 2. ඔබ ලබා දුන් setupPWAInstall Function එක
function setupPWAInstall() {
    let deferredPrompt;
    const pwaContainer = document.getElementById('pwa-installer');
    const pwaBtn = document.getElementById('btn-install-main');

    // දැනටමත් App එකක් ලෙස වැඩ කරයි නම් පෙන්වන්න එපා
    if (window.matchMedia('(display-mode: standalone)').matches) {
        return; 
    }

    // Install prompt එක සූදානම් වූ විට Container එක පෙන්වන්න
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if(pwaContainer) pwaContainer.style.display = 'block';
    });

    if(pwaBtn) {
        pwaBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    if(pwaContainer) pwaContainer.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
    }

    // Install වූ පසු හංගන්න
    window.addEventListener('appinstalled', () => {
        if(pwaContainer) pwaContainer.style.display = 'none';
        console.log('K-Win App installed successfully!');
    });
}

// 3. Window Load එකේදී function එක call කිරීම
window.onload = () => {

        showActionGrid();
    }
