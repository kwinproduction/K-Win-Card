    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #050a14; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; width: 100vw; overflow-x: hidden; 
        }

        /* Background Orbs */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: moveOrb 20s infinite alternate ease-in-out; }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: #007bff; bottom: -100px; right: -50px; animation-duration: 25s; }
        @keyframes moveOrb { from { transform: translate(0, 0); } to { transform: translate(30px, 50px); } }

        /* Card Stylings */
        .card { width: 92%; max-width: 380px; background: rgba(255, 255, 255, 0.05); padding: 25px 20px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(30px); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); padding: 4px; object-fit: cover; }
        .info-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; margin: 15px 0; border-left: 4px solid var(--primary); text-align: left; font-size: 0.8rem; line-height: 1.6; }
        
        /* Button Styles */
        .btn-save, .btn-tt { width: 100%; padding: 14px; border-radius: 18px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 0.9rem; transition: 0.3s; }
        .btn-save { background: #fff; color: #0a192f; }
        .btn-tt { background: linear-gradient(135deg, var(--primary), #3db89e); color: #0a192f; }

        /* Timetable Overlay */
        .tt-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; 
        }
        .tt-content { background: #111; width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; border: 1px solid var(--primary); text-align: left; }
        .tt-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .close-tt { background: var(--primary); color: #000; width: 100%; padding: 10px; border: none; border-radius: 12px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        /* Action Grid */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .btn-action { width: 100%; padding: 12px 5px; font-size: 0.8rem; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #128C7E; grid-column: span 2; } /* WhatsApp wide */
        .btn-call { background: #007bff; }
        .btn-sms { background: #f39c12; color: #000; }
        .btn-email { background: #e74c3c; grid-column: span 2; }

        /* Dropdowns */
        .dropdown { position: relative; width: 100%; }
        .dropdown-content { 
            display: none; position: absolute; background: white; 
            width: 100%; border-radius: 15px; z-index: 99; bottom: 110%; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); overflow: hidden;
        }
        .dropdown-content a { color: #111; padding: 12px; text-decoration: none; display: block; font-size: 0.8rem; border-bottom: 1px solid #eee; }
        .show { display: block !important; }

        /* Socials */
        .social-button-container { width: 92%; max-width: 380px; margin-top: 20px; text-align: center; }
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .grid-btn { display: flex; flex-direction: column; align-items: center; background: var(--glass); padding: 10px 5px; border-radius: 15px; text-decoration: none; color: white; font-size: 0.6rem; border: 1px solid rgba(255,255,255,0.1); }
        .grid-btn img { width: 20px; height: 20px; margin-bottom: 5px; }

        /* Overlay */
        .tt-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    /* Toast */
     .status-toast { 
    position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); 
    background: #ffffff; color: #333; padding: 15px 20px; border-radius: 20px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 20000; width: 90%; max-width: 360px; 
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; 
}
.status-toast.active { bottom: 30px; }
.status-toast.active {
    bottom: 30px; /* active වුණාම screen එක ඇතුළට එනවා */
}

.toast-content {
    display: flex;
    align-items: flex-start;
    gap: 15px;
}

.toast-icon {
    font-size: 24px;
}

.toast-details h4 {
    margin: 0;
    font-size: 16px;
    color: #333;
}

.toast-details p {
    margin: 5px 0 0;
    font-size: 13px;
    color: #666;
    line-height: 1.4;
}
/* CSS කොටස */
.status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 10px;
}
.dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
.dot-green { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
.dot-red { background: #e74c3c; }

.live-dot {
    height: 8px;
    width: 8px;
    background-color: #50e3c2;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 10px #50e3c2;
    animation: pulse-live 1.5s infinite;
}

@keyframes pulse-live {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(80, 227, 194, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(80, 227, 194, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(80, 227, 194, 0); }
}
        /* Background එකේ ඇති Orbs වල මූලික සැකසුම */

.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px); /* හොඳින් බොඳ කිරීමට */
    opacity: 0.5;
    animation: moveOrb 20s infinite alternate ease-in-out;
}

/* Orbs 3ක් සඳහා වර්ණ සහ ප්‍රමාණයන් */
.orb-1 {
    width: 300px; height: 300px;
    background: #50e3c2; /* Primary Green */
    top: -50px; left: -50px;
}

.orb-2 {
    width: 400px; height: 400px;
    background: #007bff; /* Blue */
    bottom: -100px; right: -50px;
    animation-duration: 25s;
    animation-delay: -5s;
}

.orb-3 {
    width: 250px; height: 250px;
    background: #ffcc00; /* Gold */
    top: 40%; left: 60%;
    animation-duration: 15s;
    animation-delay: -2s;
}

/* Orbs චලනය වන ආකාරය */
@keyframes moveOrb {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, 50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0, 0) scale(1); }
}
